spring:
  application:
    name: trimly-backend

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TrimlyPool

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        jdbc:
          time_zone: Asia/Kolkata
    open-in-view: false

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: Asia/Kolkata

  # ── Cache (Caffeine — OTP + rate limiting) ────────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

# ── Server ────────────────────────────────────────────────────────────────────
server:
  max-http-request-header-size: 16KB
  shutdown: graceful
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    threads:
      max: 200
      min-spare: 20
    connection-timeout: 5s
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    context-path: /

# ── App custom config ─────────────────────────────────────────────────────────
app:
  # JWT
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: 900000
    refresh-expiration-ms: 2592000000
    # Access token: 1 year — effectively permanent until logout
    # We use refresh token deletion as the logout mechanism, not expiry
#    access-expiration-ms: ${JWT_ACCESS_MS:31536000000}
    # Refresh token: 10 years — never expires unless user explicitly logs out
    # Stored in DB, deleted on logout → that IS the session termination
#    refresh-expiration-ms: ${JWT_REFRESH_MS:315360000000}

  # CORS
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

  # Platform defaults
  platform:
    commission-pct: ${COMMISSION_PCT:10}
    otp-expiry-minutes: ${OTP_EXPIRY_MIN:10}
    otp-length: 6
    max-otp-attempts: 3

  # WhatsApp Business API (Meta Cloud API)
  # Set these in external application-secrets.properties or env vars
  whatsapp:
    enabled: ${WA_ENABLED:false}
    base-url: ${WA_BASE_URL:https://graph.facebook.com/v19.0}
    phone-number-id: ${WA_PHONE_NUMBER_ID:}
    access-token: ${WA_ACCESS_TOKEN:}
    twilio:
      account-sid: ${ACCOUNT_SID:}
      auth-token: ${AUTH_TOKEN:}
      sandbox-number: +14155238886
    # Template names (must be pre-approved in Meta Business Manager)
    template:
      booking-request: bookurbarber_booking_request
      booking-confirmed: bookurbarber_booking_confirmed
      booking-rejected: bookurbarber_booking_rejected
      booking-cancelled: bookurbarber_booking_cancelled
      booking-completed: bookurbarber_booking_completed
      reschedule-request: bookurbarber_reschedule_request
      reschedule-response: bookurbarber_reschedule_response
      otp-login: bookurbarber_otp_login
      password-reset: bookurbarber_password_reset
    language: en_IN

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.trimly: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
